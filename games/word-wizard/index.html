<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Word Wizard</title>
  <meta name="description" content="Spell words from their clues and grow your vocabulary — a spelling game for big readers." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    /* ---- shared button look (matches the other games) ---- */
    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(138, 92, 255, 0.3);
      transition: transform 0.15s ease;
      touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
    .btn.ghost {
      background: var(--paper);
      color: var(--purple);
      box-shadow: 0 6px 16px rgba(43, 36, 64, 0.12);
    }

    .ww-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--purple);
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .ww-bar span { color: var(--pink); }

    /* ---- level select ---- */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.25rem;
      max-width: 760px;
      margin: 0 auto;
    }
    .level-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      background: var(--paper);
      border: 4px solid transparent;
      border-radius: 22px;
      padding: 1.4rem 1rem;
      cursor: pointer;
      box-shadow: 0 10px 26px rgba(43, 36, 64, 0.12);
      transition: transform 0.15s ease, border-color 0.15s ease;
      font-family: var(--font);
      color: var(--ink);
      text-align: center;
    }
    .level-card:hover:not(.locked),
    .level-card:focus-visible:not(.locked) {
      transform: translateY(-6px);
      border-color: var(--accent, var(--purple));
      outline: none;
    }
    .level-card .lv-emoji { font-size: 2.8rem; line-height: 1; }
    .level-card h3 { margin: 0; font-size: 1.15rem; }
    .level-card .lv-progress { font-size: 0.85rem; color: #6a6385; font-weight: bold; }
    .level-card.locked { opacity: 0.55; cursor: default; }
    .level-card.done { border-color: var(--green); }

    /* ---- play screen ---- */
    #play.hidden, #levels.hidden, #win.hidden { display: none; }

    .clue-card {
      max-width: 520px;
      margin: 0 auto 1.25rem;
      background: var(--paper);
      border-radius: 24px;
      padding: 1.5rem 1.25rem;
      box-shadow: 0 12px 30px rgba(43, 36, 64, 0.14);
    }
    .clue-emoji { font-size: 4rem; line-height: 1; }
    .clue-text { font-size: 1.25rem; margin: 0.5rem 0 0; color: var(--ink); }

    /* letter slots */
    .slots {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0 auto 1.25rem;
      max-width: 600px;
    }
    .slot {
      width: 2.6rem;
      height: 3.2rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 0 0 3px rgba(138, 92, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      font-weight: bold;
      color: var(--purple);
      text-transform: uppercase;
    }
    .slot.filled { background: var(--purple); color: #fff; box-shadow: 0 4px 10px rgba(138,92,255,0.35); }
    .slot.good   { background: var(--green); box-shadow: 0 4px 10px rgba(61,220,132,0.4); }
    .slots.wrong { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-9px); }
      60% { transform: translateX(9px); }
    }

    /* letter bank */
    .bank {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      max-width: 560px;
      margin: 0 auto 1.25rem;
    }
    .letter {
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 16px;
      border: none;
      background: linear-gradient(160deg, #fff, #f0e9ff);
      color: var(--ink);
      font-family: var(--font);
      font-size: 1.7rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(43, 36, 64, 0.16);
      transition: transform 0.1s ease, opacity 0.15s ease;
      touch-action: manipulation;
    }
    .letter:hover:not(:disabled) { transform: translateY(-3px); }
    .letter:active { transform: scale(0.9); }
    .letter:disabled { opacity: 0.25; cursor: default; }

    .controls { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }

    .feedback {
      min-height: 1.6rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--green);
      margin: 0 0 0.75rem;
    }

    /* win screen */
    #win { text-align: center; }
    #win .big { font-size: 4.5rem; line-height: 1; }
    #win h2 { color: var(--purple); font-size: 2rem; margin: 0.5rem 0; }

    /* sparkles on a correct answer */
    .sparkle {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      animation: sparkle-up 0.9s ease-out forwards;
      z-index: 5;
    }
    @keyframes sparkle-up {
      0%   { opacity: 1; transform: translateY(0) scale(0.6) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.4) rotate(40deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .slots.wrong, .sparkle { animation: none; }
      .sparkle { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">📚 Word Wizard</h1>
    <p class="subtitle">Read the clue, then spell the magic word! ✨</p>
  </header>

  <div class="ww-bar">
    <div>⭐ Stars: <span id="stars">0</span></div>
    <div>📖 Words learned: <span id="learned">0</span></div>
  </div>

  <main class="game-stage" style="max-width: 760px;">

    <!-- LEVEL SELECT -->
    <section id="levels">
      <p style="font-weight:bold;color:var(--purple);font-size:1.2rem;margin-top:0;">Pick a spellbook:</p>
      <div class="level-grid" id="level-grid"></div>
    </section>

    <!-- PLAY -->
    <section id="play" class="hidden">
      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="clue-card">
        <div class="clue-emoji" id="clue-emoji" aria-hidden="true">✨</div>
        <p class="clue-text" id="clue-text">…</p>
      </div>

      <div class="slots" id="slots" aria-label="Spell the word here"></div>
      <div class="bank" id="bank"></div>

      <div class="controls">
        <button class="btn ghost" id="hear-btn">🔊 Hear it</button>
        <button class="btn ghost" id="clear-btn">⌫ Clear</button>
        <button class="btn ghost" id="skip-btn">Skip ⏭</button>
        <button class="btn ghost" id="quit-btn">📚 Spellbooks</button>
      </div>
    </section>

    <!-- LEVEL COMPLETE -->
    <section id="win" class="hidden">
      <div class="big">🏆</div>
      <h2 id="win-title">Spellbook mastered!</h2>
      <p id="win-text" style="font-size:1.2rem;color:#6a6385;"></p>
      <div class="controls">
        <button class="btn" id="win-next">Next spellbook ▶</button>
        <button class="btn ghost" id="win-menu">📚 All spellbooks</button>
      </div>
    </section>

  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="../../assets/js/voice.js"></script>
  <script src="word-wizard.js"></script>
</body>
</html>
