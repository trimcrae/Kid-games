<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✏️ Crossword</title>
  <meta name="description" content="Themed kid-friendly crosswords — Minecraft, Bluey, Frozen, taekwondo & more. Read a clue, fill the grid!" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .btn {
      font-family: var(--font); font-size: 1.05rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none; border-radius: 999px; padding: 0.65rem 1.4rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(138,92,255,0.3); transition: transform 0.15s ease; touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }
    .btn.ghost { background: var(--paper); color: var(--purple); box-shadow: 0 6px 16px rgba(43,36,64,0.12); }

    #puzzles.hidden, #play.hidden { display: none; }
    .puz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1.1rem; max-width: 720px; margin: 0 auto; }
    .puz-card {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      background: var(--paper); border: 4px solid transparent; border-radius: 22px;
      padding: 1.3rem 1rem; cursor: pointer; box-shadow: 0 10px 26px rgba(43,36,64,0.12);
      transition: transform 0.15s ease, border-color 0.15s ease; font-family: var(--font); color: var(--ink); text-align: center;
    }
    .puz-card:hover, .puz-card:focus-visible { transform: translateY(-6px); border-color: var(--pink); outline: none; }
    .puz-card .pz-emoji { font-size: 2.6rem; }
    .puz-card h3 { margin: 0; font-size: 1.1rem; }
    .puz-card .pz-blurb { font-size: 0.82rem; color: #6a6385; }
    .puz-card.solved { border-color: var(--green); }
    /* phones: two compact columns instead of one giant card per row */
    @media (max-width: 520px) {
      .puz-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
      .puz-card { padding: 0.9rem 0.5rem; border-radius: 18px; gap: 0.2rem; }
      .puz-card .pz-emoji { font-size: 2.1rem; }
      .puz-card h3 { font-size: 0.98rem; }
    }

    .play-head { display:flex; align-items:center; justify-content:center; gap:0.6rem; flex-wrap:wrap; margin-bottom:0.4rem; }
    .play-head h2 { margin:0; font-size:1.3rem; color:var(--purple); }
    .feedback { min-height:1.4rem; font-size:1.05rem; font-weight:bold; color:var(--green); margin:0.25rem 0 0.6rem; }

    /* layout: grid + clues side by side on wide screens */
    .cw-layout { display:flex; gap:1.25rem; flex-wrap:wrap; justify-content:center; align-items:flex-start; }

    .grid-wrap { display:inline-block; background:#2b2440; padding:5px; border-radius:10px; box-shadow:0 10px 26px rgba(43,36,64,0.2); }
    .xgrid { display:grid; gap:2px; }
    .block { background:transparent; width:100%; height:100%; }
    .xcell { position:relative; background:#fff; border-radius:3px; }
    .xcell .cellnum { position:absolute; top:1px; left:2px; font-size:0.55rem; font-weight:bold; color:#6a6385; pointer-events:none; line-height:1; }
    .xinput {
      width:100%; height:100%; border:none; background:transparent; text-align:center;
      font-family:var(--font); font-weight:bold; text-transform:uppercase; color:var(--ink);
      padding:0; margin:0; cursor:pointer; caret-color:transparent;
    }
    .xinput:focus { outline:none; }
    .xcell.active { background:#dbe9ff; }
    .xcell.cursor { background:var(--yellow); }
    .xcell.good .xinput { color:#2bbf6e; }
    .xcell.bad { background:#ffd6e0; }

    .clues { text-align:left; max-width:340px; }
    .clues h3 { margin:0.3rem 0 0.2rem; color:var(--pink); font-size:1.05rem; }
    .clue-li {
      list-style:none; padding:0.3rem 0.5rem; margin:0; border-radius:8px; cursor:pointer; font-size:0.92rem;
      display:flex; gap:0.4rem;
    }
    .clue-li .cnum { font-weight:bold; color:var(--purple); min-width:1.2rem; }
    .clue-li:hover { background:#f0ecfb; }
    .clue-li.active { background:#dbe9ff; }
    .clue-li.done .ctext { text-decoration:line-through; color:#9a93ad; }
    ul.clue-list { padding:0; margin:0 0 0.75rem; }

    .controls { display:flex; justify-content:center; gap:0.6rem; flex-wrap:wrap; margin:1rem 0; }

    .sparkle { position:fixed; font-size:1.5rem; pointer-events:none; animation:sparkle-up 0.9s ease-out forwards; z-index:5; }
    @keyframes sparkle-up { 0%{opacity:1;transform:translateY(0) scale(0.6);} 100%{opacity:0;transform:translateY(-90px) scale(1.4) rotate(40deg);} }
    @media (prefers-reduced-motion: reduce){ .sparkle{display:none;} }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">✏️ Crossword</h1>
    <p class="subtitle">Read the clues and fill in the grid — one letter per box!</p>
  </header>

  <main class="game-stage" style="max-width: 820px;">

    <section id="puzzles">
      <p style="font-weight:bold;color:var(--pink);font-size:1.2rem;margin-top:0;">Pick a crossword:</p>
      <div class="puz-grid" id="puz-grid"></div>
    </section>

    <section id="play" class="hidden">
      <div class="play-head"><h2 id="puz-title">…</h2></div>
      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="cw-layout">
        <div class="grid-wrap"><div class="xgrid" id="xgrid"></div></div>
        <div class="clues">
          <h3>Across</h3>
          <ul class="clue-list" id="across-clues"></ul>
          <h3>Down</h3>
          <ul class="clue-list" id="down-clues"></ul>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="check-btn">✓ Check</button>
        <button class="btn ghost" id="reveal-btn">👀 Reveal</button>
        <button class="btn ghost" id="clear-btn">🧽 Clear</button>
        <button class="btn ghost" id="quit-btn">✏️ All puzzles</button>
      </div>
    </section>

  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="crossword.js"></script>
</body>
</html>
