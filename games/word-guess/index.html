<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🟩 Word Guess</title>
  <meta name="description" content="Guess the secret 5-letter word in 6 tries — a kid-friendly Wordle with hints, for spelling & reasoning." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟩</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .btn {
      font-family: var(--font); font-size: 1.1rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--green), #2bbf6e);
      border: none; border-radius: 999px; padding: 0.7rem 1.5rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(61,220,132,0.35); transition: transform 0.15s ease; touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }
    .btn.ghost { background: var(--paper); color: #2bbf6e; box-shadow: 0 6px 16px rgba(43,36,64,0.12); }

    .wg-bar { display:flex; justify-content:center; gap:1.5rem; font-size:1.1rem; font-weight:bold; color:#2bbf6e; margin-bottom:0.25rem; flex-wrap:wrap; }
    .wg-bar span { color: var(--pink); }

    .hint { min-height:1.6rem; font-size:1.15rem; font-weight:bold; color:var(--purple); margin:0.25rem 0; }
    .feedback { min-height:1.5rem; font-size:1.15rem; font-weight:bold; color:var(--green); margin:0 0 0.5rem; }

    /* board */
    .grid { display:grid; grid-template-rows:repeat(6,1fr); gap:0.4rem; width:300px; max-width:88vw; margin:0.5rem auto 1rem; }
    .row { display:grid; grid-template-columns:repeat(5,1fr); gap:0.4rem; }
    .cell {
      aspect-ratio:1/1; border-radius:12px; background:rgba(255,255,255,0.7);
      box-shadow: inset 0 0 0 3px rgba(138,92,255,0.18);
      display:flex; align-items:center; justify-content:center;
      font-size:1.7rem; font-weight:bold; text-transform:uppercase; color:var(--ink);
    }
    .cell.filled { box-shadow: inset 0 0 0 3px rgba(138,92,255,0.5); }
    .cell.correct { background:var(--green); color:#fff; box-shadow:none; }
    .cell.present { background:var(--yellow); color:#fff; box-shadow:none; }
    .cell.absent  { background:#b9b3c9; color:#fff; box-shadow:none; }
    .row.bad { animation: shake 0.4s ease; }
    .cell.flip { animation: flip 0.5s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 60%{transform:translateX(8px);} }
    @keyframes flip { 0%{transform:rotateX(0);} 50%{transform:rotateX(90deg);} 100%{transform:rotateX(0);} }

    /* keyboard */
    .kb { max-width:520px; margin:0 auto 1rem; display:flex; flex-direction:column; gap:0.4rem; }
    .kb-row { display:flex; justify-content:center; gap:0.3rem; }
    .key {
      flex:1 1 auto; min-width:0; max-width:2.4rem; height:3.1rem; border:none; border-radius:9px;
      background:#e9e3f7; color:var(--ink); font-family:var(--font); font-size:1.05rem; font-weight:bold;
      text-transform:uppercase; cursor:pointer; touch-action:manipulation; padding:0;
      transition: transform 0.08s ease;
    }
    .key:active { transform: scale(0.9); }
    .key.wide { max-width:4.2rem; font-size:0.8rem; flex:1.6 1 auto; }
    .key.correct { background:var(--green); color:#fff; }
    .key.present { background:var(--yellow); color:#fff; }
    .key.absent  { background:#b9b3c9; color:#fff; }

    .controls { display:flex; justify-content:center; gap:0.6rem; flex-wrap:wrap; }
    .mode-row { display:flex; justify-content:center; gap:0.5rem; margin:0.25rem 0 0.75rem; }
    .mode-btn {
      font-family:var(--font); font-size:0.95rem; font-weight:bold; color:#2bbf6e;
      background:var(--paper); border:3px solid transparent; border-radius:999px;
      padding:0.4rem 1.1rem; cursor:pointer; box-shadow:0 4px 12px rgba(43,36,64,0.12); touch-action:manipulation;
    }
    .mode-btn.on { background:var(--green); color:#fff; border-color:#2bbf6e; }

    .sparkle { position:fixed; font-size:1.5rem; pointer-events:none; animation:sparkle-up 0.9s ease-out forwards; z-index:5; }
    @keyframes sparkle-up { 0%{opacity:1;transform:translateY(0) scale(0.6);} 100%{opacity:0;transform:translateY(-90px) scale(1.4) rotate(40deg);} }
    @media (prefers-reduced-motion: reduce){ .row.bad,.cell.flip,.sparkle{animation:none;} .sparkle{display:none;} }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">🟩 Word Guess</h1>
    <p class="subtitle">Guess the secret 5-letter word in 6 tries!</p>
  </header>

  <main class="game-stage" style="max-width: 620px;">
    <div class="wg-bar">
      <div>🔥 Streak: <span id="streak">0</span></div>
      <div>🏆 Wins: <span id="wins">0</span></div>
    </div>

    <div class="mode-row">
      <button class="mode-btn" id="easy-btn">🐣 Easy (4 letters)</button>
      <button class="mode-btn" id="normal-btn">🟩 Normal (5 letters)</button>
    </div>

    <div class="hint" id="hint" aria-live="polite"></div>
    <p class="feedback" id="feedback" aria-live="polite"></p>

    <div class="grid" id="grid"></div>
    <div class="kb" id="kb"></div>

    <div class="controls">
      <button class="btn ghost" id="hint-btn">💡 Hint</button>
      <button class="btn" id="new-btn">🔄 New word</button>
    </div>
  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="word-guess.js"></script>
</body>
</html>
