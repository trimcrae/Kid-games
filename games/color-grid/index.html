<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈 Color Grid Quest</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌈</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .quest {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--purple);
      margin-bottom: 1rem;
    }
    .scoreboard span { color: var(--pink); }

    /* The prompt: a big block with the letter + the question */
    .prompt {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      background: rgba(255,255,255,0.7);
      border-radius: 22px;
      padding: 1rem 1.25rem;
      box-shadow: 0 8px 22px rgba(43,36,64,0.12);
      margin-bottom: 1.25rem;
    }
    #prompt-block {
      flex: 0 0 auto;
      width: 76px;
      height: 76px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 900;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15), 0 6px 14px rgba(0,0,0,0.18);
    }
    #prompt-text { font-size: 1.3rem; text-align: left; line-height: 1.3; }

    /* Choice buttons */
    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .choices.waiting { pointer-events: none; }
    .choice {
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      background: #fff;
      border: 4px solid #eee;
      border-radius: 20px;
      padding: 1.1rem 0.5rem;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(43,36,64,0.12);
      transition: transform 0.14s ease, border-color 0.14s ease;
    }
    .choice:hover { transform: translateY(-4px); border-color: var(--blue); }
    .choice-emoji { font-size: 2.6rem; line-height: 1; }
    .choice-word { font-size: 1.15rem; font-weight: bold; color: var(--ink); }

    .choice.correct { border-color: var(--green); background: #eafff0; animation: pop-correct 0.4s ease; }
    @keyframes pop-correct {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .choice.wrong { animation: shake 0.45s ease; border-color: var(--pink); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
    }

    /* The wall you build */
    .wall-wrap {
      text-align: center;
    }
    .wall-label { font-weight: bold; color: var(--purple); margin-bottom: 0.5rem; }
    #wall {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      min-height: 60px;
      padding: 0.75rem;
      background: rgba(255,255,255,0.5);
      border-radius: 18px;
      border: 3px dashed #cdbfff;
    }
    .wall-block {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.18);
      animation: drop-in 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes drop-in {
      0% { transform: translateY(-30px) scale(0.6); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Start / win overlay */
    .start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(3px);
      text-align: center;
      padding: 1.5rem;
      z-index: 10;
    }
    .start-overlay.hidden { display: none; }
    .start-overlay h2 { font-size: 2rem; margin: 0; color: var(--purple); }
    .start-overlay p { max-width: 26rem; font-size: 1.1rem; }
    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(138,92,255,0.3);
      transition: transform 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem; padding-bottom: 0.5rem;">
    <h1 class="title">🌈 Color Grid Quest</h1>
  </header>

  <div class="quest">
    <div class="scoreboard">
      <div>Blocks: <span id="placed">0</span> / <span id="goal">12</span></div>
      <div>Streak: <span id="streak">0</span> 🔥</div>
    </div>

    <div class="prompt">
      <div id="prompt-block">?</div>
      <div id="prompt-text">Get ready to build!</div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="wall-wrap">
      <div class="wall-label">Your wall 🧱</div>
      <div id="wall"></div>
    </div>
  </div>

  <div class="start-overlay" id="overlay">
    <h2 id="overlay-title">Color Grid Quest 🌈</h2>
    <p id="overlay-text">
      A colour and a letter will pop up. Tap the word that is <b>that colour</b>
      AND <b>starts with that letter</b> to place a block. Build the whole wall to win!
    </p>
    <button class="btn" id="start-btn">Start Building ▶</button>
  </div>

  <script src="data.js"></script>
  <script src="color-grid.js"></script>
</body>
</html>
