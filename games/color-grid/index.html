<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌈 Color Grid Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌈</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .builder-wrap { max-width: 960px; margin: 0 auto; padding: 0 0.75rem 3rem; }

    .how {
      text-align: center;
      color: #6a6385;
      font-size: 1.05rem;
      margin: 0 auto 1rem;
      max-width: 38rem;
    }

    /* kid picker */
    .kid-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .kid-pick {
      font-family: var(--font);
      font-weight: bold;
      font-size: 1.05rem;
      border: 3px solid var(--kc, #ccc);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(43,36,64,0.12);
      transition: transform 0.12s ease;
    }
    .kid-pick:hover { transform: translateY(-2px); }
    .kid-pick.selected {
      background: var(--kc, #ccc);
      color: #fff;
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 0 3px #fff, 0 6px 14px rgba(43,36,64,0.25);
    }

    /* variant picker (start / middle / end) */
    .variant-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .variant-pick {
      font-family: var(--font);
      font-weight: bold;
      font-size: 1rem;
      border: 3px solid var(--purple);
      background: #fff;
      color: var(--purple);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(43,36,64,0.12);
      transition: transform 0.12s ease;
    }
    .variant-pick small { display: block; font-size: 0.72rem; font-weight: normal; opacity: 0.8; }
    .variant-pick:hover { transform: translateY(-2px); }
    .variant-pick.selected {
      background: var(--purple);
      color: #fff;
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 0 3px #fff, 0 6px 14px rgba(43,36,64,0.25);
    }
    .variant-pick.selected small { opacity: 0.9; }

    /* "which letter?" chooser for the middle variant */
    #chooser {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      max-width: 34rem;
      margin: 0 auto 0.6rem;
      padding: 0.7rem 0.9rem;
      background: #faf6ff;
      border: 3px dashed var(--purple);
      border-radius: 16px;
    }
    .chooser-label { font-weight: bold; color: var(--purple); text-align: center; }
    .chooser-letters { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; }
    .letter-pick {
      font-family: var(--font);
      font-weight: 900;
      font-size: 1.4rem;
      width: 2.6rem;
      height: 2.6rem;
      border: 3px solid var(--purple);
      background: #fff;
      color: var(--purple);
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.12s ease;
    }
    .letter-pick:hover { transform: translateY(-2px) scale(1.06); }
    .letter-pick.edge {
      border-color: #ddd;
      color: #bbb;
      background: #f3f3f6;
      cursor: default;
    }

    /* colour picker */
    .color-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .color-pick {
      font-family: var(--font);
      font-weight: bold;
      font-size: 0.95rem;
      border: 3px solid transparent;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(43,36,64,0.15);
      transition: transform 0.12s ease;
    }
    .color-pick:hover { transform: translateY(-2px); }
    .color-pick.selected {
      border-color: #2b2440;
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 0 3px #fff, 0 6px 14px rgba(43,36,64,0.25);
    }

    /* add-a-word form */
    #add-form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      max-width: 30rem;
      margin: 0 auto 0.4rem;
    }
    #word-input {
      flex: 1;
      font-family: var(--font);
      font-size: 1.3rem;
      padding: 0.7rem 1rem;
      border: 3px solid var(--purple);
      border-radius: 16px;
      outline: none;
      min-width: 0;
    }
    #word-input.shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }
    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 16px;
      padding: 0.7rem 1.25rem;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(138,92,255,0.3);
      transition: transform 0.15s ease;
      white-space: nowrap;
    }
    .btn:hover { transform: scale(1.04); }

    .hint { text-align: center; min-height: 1.5rem; font-weight: bold; color: #7a52d6; margin-bottom: 0.5rem; }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-weight: bold;
      color: var(--purple);
    }
    .mini-btn {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: bold;
      border: 2px solid #cdbfff;
      background: #fff;
      color: var(--purple);
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
    }
    .mini-btn:hover { background: #f3effff; }

    /* the grid */
    .grid-scroll {
      max-height: 64vh;
      overflow: auto;
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(43,36,64,0.14);
      background: #fff;
    }
    table { border-collapse: separate; border-spacing: 0; width: 100%; }
    th, td { border-right: 1px solid #eee; border-bottom: 1px solid #eee; }

    .corner {
      position: sticky; top: 0; left: 0; z-index: 5;
      background: #fff; width: 40px; min-width: 40px;
    }
    .col-head {
      position: sticky; top: 0; z-index: 4;
      font-size: 0.85rem; padding: 0.5rem 0.25rem;
      min-width: 92px;
    }
    .row-head {
      position: sticky; left: 0; z-index: 3;
      background: #faf8ff; color: var(--purple);
      font-size: 1.1rem; font-weight: 900;
      width: 40px; min-width: 40px; text-align: center;
    }
    .cell {
      vertical-align: top;
      padding: 4px;
      min-width: 92px;
      height: 44px;
    }
    .cell.flash { animation: flash 0.7s ease; }
    @keyframes flash {
      0% { background: #fff7c2; }
      100% { background: transparent; }
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.8rem;
      font-weight: bold;
      border-radius: 8px;
      padding: 2px 4px 2px 7px;
      margin: 2px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
      animation: drop-in 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes drop-in {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .chip-x {
      border: none;
      background: rgba(0,0,0,0.18);
      color: inherit;
      border-radius: 50%;
      width: 16px; height: 16px;
      line-height: 14px;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }
    .chip-x:hover { background: rgba(0,0,0,0.35); }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem; padding-bottom: 0.25rem;">
    <h1 class="title">🌈 Color Grid Builder</h1>
  </header>

  <div class="builder-wrap">
    <p class="how" id="how"></p>

    <div class="kid-row" id="kid-row" aria-label="Whose grid?"></div>

    <div class="variant-row" id="variant-row" aria-label="Which letter counts?"></div>

    <div class="color-row" id="color-row" aria-label="Pick a colour"></div>

    <form id="add-form" autocomplete="off">
      <input id="word-input" type="text" placeholder="Type a word…" aria-label="Type a word" />
      <button class="btn" type="submit">Add ＋</button>
    </form>

    <div id="chooser" aria-live="polite"></div>

    <div class="hint" id="hint"></div>

    <div class="stats">
      <span>Words in grid: <span id="count">0</span></span>
      <button class="mini-btn" id="starter" type="button">Load starter words ✨</button>
      <button class="mini-btn" id="clear" type="button">Clear grid 🗑️</button>
    </div>

    <div class="grid-scroll">
      <table>
        <thead id="grid-head"></thead>
        <tbody id="grid-body"></tbody>
      </table>
    </div>
  </div>

  <script src="../../assets/js/sfx.js"></script>
  <script src="data.js"></script>
  <script src="color-grid.js"></script>
</body>
</html>
