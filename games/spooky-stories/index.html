<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👻 Spooky Princess Stories</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👻</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    /* ---- Spooky-cute storybook styles ---- */
    .sb-wrap { max-width: 760px; margin: 0 auto 3rem; padding: 0 1rem; }

    /* Library (story picker) */
    .sb-intro { text-align: center; color: var(--purple); font-weight: bold;
                font-size: clamp(1rem, 3.4vw, 1.3rem); margin: 0.25rem 0 1.25rem; }
    .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.25rem;
    }
    .story-card {
      border: none; cursor: pointer; font-family: inherit; color: #fff;
      border-radius: 26px; padding: 1.4rem 1rem 1.2rem; text-align: center;
      box-shadow: 0 12px 28px rgba(43,36,64,.28);
      background: linear-gradient(160deg, #5b3a93, #2a1a4f);
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative; overflow: hidden;
    }
    .story-card:hover, .story-card:focus-visible {
      transform: translateY(-6px) rotate(-1deg);
      box-shadow: 0 18px 38px rgba(43,36,64,.4); outline: none;
    }
    .story-card .cover { font-size: 4rem; line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.35)); }
    .story-card .cover-svg { width: 100%; max-width: 230px; height: 130px; display:block; margin: 0 auto .3rem; }
    .story-card .cover-svg .cover-img { width: 100%; height: 130px; object-fit: cover; display:block; border-radius: 12px; }
    .story-card .cover-svg canvas { width: 100%; height: 130px; object-fit: cover; display:block; border-radius: 12px; image-rendering: pixelated; }
    .story-card h2 { margin: .4rem 0 .15rem; font-size: 1.2rem; }
    .story-card p  { margin: 0; font-size: .85rem; opacity: .85; }
    .story-card .done-star {
      position: absolute; top: 10px; right: 12px; font-size: 1.5rem;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.25);opacity:1} }

    /* Reader */
    .reader { display: none; }
    .reader.active { display: block; }
    .book {
      background: linear-gradient(160deg, #3a2566 0%, #1c1336 100%);
      border-radius: 28px; padding: .9rem .9rem 1.1rem;
      box-shadow: 0 16px 40px rgba(20,12,45,.45);
      border: 4px solid #6b49b8;
    }
    .page-art {
      width: 100%; border-radius: 20px; display: block;
      background: #120a2a; aspect-ratio: 4 / 3;
    }
    .page-art .scene-img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 20px; }
    .page-art canvas { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 20px; image-rendering: pixelated; }
    .page-art.turning { animation: pageTurn .45s ease; }
    @keyframes pageTurn {
      0%   { transform: perspective(900px) rotateY(0); opacity: 1; }
      45%  { transform: perspective(900px) rotateY(-18deg) scale(.96); opacity: .25; }
      100% { transform: perspective(900px) rotateY(0); opacity: 1; }
    }
    .page-text {
      color: #fff; font-size: clamp(1.15rem, 4.4vw, 1.6rem); line-height: 1.4;
      text-align: center; margin: .9rem .4rem .2rem; min-height: 3.2em;
      font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* dots */
    .dots { display: flex; justify-content: center; gap: 8px; margin: .4rem 0 .2rem; }
    .dots span { width: 11px; height: 11px; border-radius: 50%;
      background: rgba(255,255,255,.3); transition: background .2s, transform .2s; }
    .dots span.on { background: var(--yellow); transform: scale(1.25); }

    /* Controls — big tap targets for little fingers */
    .controls { display: flex; align-items: center; justify-content: center;
      gap: .8rem; margin-top: .7rem; flex-wrap: wrap; }
    .big-btn {
      border: none; cursor: pointer; font-family: inherit; font-weight: bold;
      color: #2b2440; background: var(--yellow);
      border-radius: 999px; padding: .85rem 1.3rem; font-size: 1.2rem;
      box-shadow: 0 6px 0 #c79a2e, 0 10px 18px rgba(0,0,0,.25);
      transition: transform .08s ease, box-shadow .08s ease; min-width: 64px;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c79a2e, 0 4px 10px rgba(0,0,0,.25); }
    .big-btn:disabled { opacity: .4; cursor: default; box-shadow: 0 6px 0 #c79a2e; }
    .big-btn.round { padding: .85rem; font-size: 1.6rem; line-height: 1; min-width: 0; }
    .big-btn.pink  { background: var(--pink);  color:#fff; box-shadow: 0 6px 0 #c23968, 0 10px 18px rgba(0,0,0,.25); }
    .big-btn.pink:active { box-shadow: 0 2px 0 #c23968, 0 4px 10px rgba(0,0,0,.25); }
    .big-btn.blue  { background: var(--blue);  color:#fff; box-shadow: 0 6px 0 #2a86bd, 0 10px 18px rgba(0,0,0,.25); }
    .big-btn.blue:active { box-shadow: 0 2px 0 #2a86bd, 0 4px 10px rgba(0,0,0,.25); }

    .reader-top { display:flex; align-items:center; justify-content:space-between; gap:.5rem; margin-bottom:.6rem; }
    .reader-title { color: var(--yellow); font-size: clamp(1.1rem,3.6vw,1.5rem); margin: 0; }

    /* tappable characters in the art */
    .tap { cursor: pointer; transform-box: fill-box; transform-origin: center; }
    .tap:hover { filter: brightness(1.12); }
    .wiggle { animation: wiggle-pop .6s ease; }
    @keyframes wiggle-pop {
      0%,100% { transform: rotate(0) scale(1); }
      20% { transform: rotate(-7deg) scale(1.12); }
      50% { transform: rotate(7deg) scale(1.16); }
      80% { transform: rotate(-4deg) scale(1.08); }
    }
    .hint-bob { animation: hint-bob 2.2s ease-in-out infinite; }
    @keyframes hint-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    /* sparkle layer */
    .stage { position: relative; }
    .spark { position: absolute; pointer-events: none; font-size: 1.4rem;
      animation: spark-fly .8s ease-out forwards; will-change: transform, opacity; }
    @keyframes spark-fly {
      0% { transform: translate(0,0) scale(.4); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.3); opacity: 0; }
    }
    .tap-hint { text-align:center; color:#d9c8ff; font-size:.9rem; margin:.2rem 0 0; min-height:1.1em; }

    @media (prefers-reduced-motion: reduce) {
      .page-art.turning, .wiggle, .hint-bob, .spark, .story-card .done-star { animation: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding: .5rem 1rem 0;">
    <h1 class="title">👻 Spooky Princess Stories</h1>
  </header>

  <main class="sb-wrap">
    <!-- LIBRARY -->
    <section id="library">
      <p class="sb-intro">Pick a story, princess! Tap a book to read together. 💜</p>
      <div id="story-grid" class="story-grid"></div>
    </section>

    <!-- READER -->
    <section id="reader" class="reader">
      <div class="reader-top">
        <button class="big-btn blue round" id="home-btn" aria-label="Back to story list">🏠</button>
        <h2 class="reader-title" id="reader-title">Story</h2>
        <button class="big-btn round" id="read-btn" aria-label="Read this page out loud">🔊</button>
      </div>

      <div class="book">
        <div class="stage">
          <div class="page-art" id="page-art" role="img" aria-label="story picture"></div>
        </div>
        <p class="page-text" id="page-text"></p>
        <p class="tap-hint" id="tap-hint">✨ Tap the picture to play! ✨</p>
        <div class="dots" id="dots" aria-hidden="true"></div>
      </div>

      <div class="controls">
        <button class="big-btn pink" id="prev-btn">◀ Back</button>
        <button class="big-btn" id="next-btn">Turn the page ▶</button>
      </div>
    </section>
  </main>

  <script src="../../assets/js/pixelate.js"></script>
  <script src="storybook.js"></script>
</body>
</html>
