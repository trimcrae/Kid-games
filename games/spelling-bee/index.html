<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐝 Spelling Bee</title>
  <meta name="description" content="Make as many words as you can from the honeycomb of letters — a kid-friendly Spelling Bee for spelling & vocabulary." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐝</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .btn {
      font-family: var(--font); font-size: 1.15rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--yellow), #ffb84d);
      border: none; border-radius: 999px; padding: 0.7rem 1.6rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 184, 77, 0.4);
      transition: transform 0.15s ease; touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
    .btn.ghost { background: var(--paper); color: #b8860b; box-shadow: 0 6px 16px rgba(43,36,64,0.12); }

    .bee-bar {
      display: flex; justify-content: center; gap: 1.5rem; font-size: 1.2rem; font-weight: bold;
      color: #b8860b; margin-bottom: 0.5rem; flex-wrap: wrap;
    }
    .bee-bar span { color: var(--pink); }

    /* puzzle picker */
    #puzzles.hidden, #play.hidden { display: none; }
    .puz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 1.1rem; max-width: 720px; margin: 0 auto; }
    .puz-card {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      background: var(--paper); border: 4px solid transparent; border-radius: 22px;
      padding: 1.3rem 1rem; cursor: pointer; box-shadow: 0 10px 26px rgba(43,36,64,0.12);
      transition: transform 0.15s ease, border-color 0.15s ease; font-family: var(--font); color: var(--ink);
    }
    .puz-card:hover, .puz-card:focus-visible { transform: translateY(-6px); border-color: var(--yellow); outline: none; }
    .puz-card .pz-emoji { font-size: 2.6rem; }
    .puz-card h3 { margin: 0; font-size: 1.1rem; }
    .puz-card .pz-progress { font-size: 0.85rem; color: #6a6385; font-weight: bold; }
    .puz-card.done { border-color: var(--green); }
    /* phones: two compact columns instead of one giant card per row */
    @media (max-width: 520px) {
      .puz-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
      .puz-card { padding: 0.9rem 0.5rem; border-radius: 18px; gap: 0.2rem; }
      .puz-card .pz-emoji { font-size: 2.1rem; }
      .puz-card h3 { font-size: 0.98rem; }
    }

    /* the rank / progress */
    .rank { font-size: 1.3rem; font-weight: bold; color: #b8860b; min-height: 1.6rem; margin: 0.25rem 0; }

    /* the word you're building */
    .entry {
      min-height: 2.4rem; font-size: 2rem; font-weight: bold; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink); margin: 0.25rem 0 0.5rem;
    }
    .entry .center { color: var(--yellow); }
    .entry .ghosttext { color: #c7c0d8; }

    .feedback { min-height: 1.5rem; font-size: 1.15rem; font-weight: bold; color: var(--green); margin: 0 0 0.5rem; }

    /* honeycomb */
    .hive { width: 280px; max-width: 90vw; margin: 0.5rem auto 1rem; position: relative; aspect-ratio: 1 / 1; }
    .cell {
      position: absolute; width: 33.3%; height: 38%; left: 33.3%; top: 31%;
      border: none; background: none; padding: 0; cursor: pointer; font-family: var(--font);
      touch-action: manipulation;
    }
    .hex {
      width: 100%; height: 100%;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      background: #e9e3f7; color: var(--ink); font-size: 1.9rem; font-weight: bold; text-transform: uppercase;
      transition: transform 0.08s ease, background 0.15s ease;
    }
    .cell.center .hex { background: var(--yellow); color: #fff; }
    .cell:active .hex { transform: scale(0.9); }
    /* six outer positions around the centre */
    .cell.p0 { transform: translate(0, -86%); }
    .cell.p1 { transform: translate(86%, -43%); }
    .cell.p2 { transform: translate(86%, 43%); }
    .cell.p3 { transform: translate(0, 86%); }
    .cell.p4 { transform: translate(-86%, 43%); }
    .cell.p5 { transform: translate(-86%, -43%); }

    .controls { display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; }

    .found-wrap { max-width: 520px; margin: 0 auto; text-align: left; }
    .found-wrap h3 { color: #b8860b; margin: 0.5rem 0; font-size: 1.05rem; text-align: center; }
    .found-list { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
    .found-chip {
      background: var(--paper); border-radius: 999px; padding: 0.3rem 0.8rem; font-weight: bold;
      text-transform: capitalize; box-shadow: 0 4px 10px rgba(43,36,64,0.1); font-size: 0.95rem;
    }
    .found-chip.pangram { background: var(--yellow); color: #fff; }

    .sparkle { position: fixed; font-size: 1.5rem; pointer-events: none; animation: sparkle-up 0.9s ease-out forwards; z-index: 5; }
    @keyframes sparkle-up {
      0% { opacity: 1; transform: translateY(0) scale(0.6) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.4) rotate(40deg); }
    }
    .entry.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 60%{transform:translateX(8px);} }
    @media (prefers-reduced-motion: reduce) { .entry.shake, .sparkle { animation: none; } .sparkle { display: none; } }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">🐝 Spelling Bee</h1>
    <p class="subtitle">Make words from the honeycomb — every word uses the middle letter!</p>
  </header>

  <main class="game-stage" style="max-width: 760px;">

    <!-- PUZZLE PICKER -->
    <section id="puzzles">
      <p style="font-weight:bold;color:#b8860b;font-size:1.2rem;margin-top:0;">Pick a hive:</p>
      <div class="puz-grid" id="puz-grid"></div>
    </section>

    <!-- PLAY -->
    <section id="play" class="hidden">
      <div class="bee-bar">
        <div>🍯 Score: <span id="score">0</span></div>
        <div>📝 Words: <span id="wordcount">0</span></div>
      </div>
      <div class="rank" id="rank" aria-live="polite">Start spelling!</div>
      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="entry" id="entry"><span class="ghosttext">type or tap letters…</span></div>

      <div class="hive" id="hive"></div>

      <div class="controls">
        <button class="btn ghost" id="delete-btn">⌫ Delete</button>
        <button class="btn ghost" id="shuffle-btn">🔀 Shuffle</button>
        <button class="btn" id="enter-btn">Enter ✓</button>
      </div>
      <div class="controls" style="margin-top:-0.4rem;">
        <button class="btn ghost" id="quit-btn">🐝 All hives</button>
      </div>

      <div class="found-wrap">
        <h3>Words you found</h3>
        <div class="found-list" id="found-list"></div>
      </div>
    </section>

  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="../../assets/js/voice.js"></script>
  <script src="spelling-bee.js"></script>
</body>
</html>
