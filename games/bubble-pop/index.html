<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🫧 Number Bubble Pop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫧</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--purple);
      margin-bottom: 0.5rem;
    }
    .scoreboard span { color: var(--pink); }

    #play-area {
      position: relative;
      height: 60vh;
      min-height: 380px;
      margin: 0 1rem 2rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 0 0 4px rgba(138, 92, 255, 0.15);
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -120px;
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--c, #38b6ff));
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
      animation: rise linear forwards;
      border: none;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.25);
    }
    .bubble:active { transform: scale(0.85); }

    .bubble.wrong { animation: rise linear forwards, shake 0.35s ease; }
    @keyframes shake {
      0%, 100% { margin-left: 0; }
      25% { margin-left: -8px; }
      75% { margin-left: 8px; }
    }

    @keyframes rise {
      from { transform: translateY(0); }
      to   { transform: translateY(-78vh); }
    }

    .pop {
      animation: pop 0.25s ease-out forwards !important;
      pointer-events: none;
    }
    @keyframes pop {
      to { transform: scale(1.8); opacity: 0; }
    }

    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(138, 92, 255, 0.3);
      transition: transform 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); }

    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 1rem;
    }
    .start-overlay h2 { font-size: 2rem; margin: 0; color: var(--purple); }
    .start-overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">🫧 Number Bubble Pop</h1>
  </header>

  <p style="text-align:center; font-size:1.5rem; font-weight:bold; color:var(--ink); margin:0 0 0.25rem;">
    Pop the number: <span id="target" style="color:var(--pink); font-size:2rem;">?</span>
  </p>

  <div class="scoreboard">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">45</span></div>
  </div>

  <div id="play-area">
    <div class="start-overlay" id="overlay">
      <h2 id="overlay-title">Find the numbers! 🔢</h2>
      <p id="overlay-text">A number will appear at the top. Pop the bubble that matches it before time runs out!</p>
      <button class="btn" id="start-btn">Start Game ▶</button>
    </div>
  </div>

  <script src="bubble-pop.js"></script>
</body>
</html>
