<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🫧 Number Bubble Pop</title>
  <meta name="description" content="Pop the bubble that matches the number — number recognition & counting for little ones, with three difficulty levels." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫧</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .scoreboard {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1.2rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--purple);
      margin-bottom: 0.5rem;
    }
    .scoreboard span { color: var(--pink); }
    .scoreboard .combo-chip {
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      padding: 0 0.7rem;
      border-radius: 999px;
      transition: transform 0.12s ease;
    }
    .scoreboard .combo-chip.bump { transform: scale(1.25); }
    .scoreboard .combo-chip.zero { opacity: 0.45; }

    #play-area {
      position: relative;
      height: 60vh;
      min-height: 380px;
      margin: 0 1rem 2rem;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 0 0 4px rgba(138, 92, 255, 0.15);
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -120px;
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--c, #38b6ff));
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
      animation: rise linear forwards;
      border: none;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.25);
    }
    .bubble:active { transform: scale(0.85); }

    .bubble.wrong { animation: rise linear forwards, shake 0.35s ease; }
    @keyframes shake {
      0%, 100% { margin-left: 0; }
      25% { margin-left: -8px; }
      75% { margin-left: 8px; }
    }

    @keyframes rise {
      from { transform: translateY(0); }
      to   { transform: translateY(-78vh); }
    }

    .pop {
      animation: pop 0.25s ease-out forwards !important;
      pointer-events: none;
    }
    @keyframes pop {
      to { transform: scale(1.8); opacity: 0; }
    }

    /* little splash particles when a bubble pops */
    .splash {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      animation: splash-fly 0.5s ease-out forwards;
    }
    @keyframes splash-fly {
      to { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
    }

    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(138, 92, 255, 0.3);
      transition: transform 0.15s ease;
      touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }

    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 1rem;
    }
    .start-overlay h2 { font-size: 2rem; margin: 0; color: var(--purple); }
    .start-overlay p { margin: 0; max-width: 22rem; color: var(--ink); }
    .start-overlay.hidden { display: none; }

    /* difficulty picker */
    .levels {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .level-btn {
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: bold;
      color: var(--purple);
      background: #fff;
      border: 3px solid var(--blue);
      border-radius: 16px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.12s ease;
    }
    .level-btn:hover { transform: translateY(-2px); }
    .level-btn[aria-pressed="true"] {
      color: #fff;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      border-color: var(--purple);
    }
    .level-btn small { display: block; font-weight: normal; font-size: 0.8rem; opacity: 0.85; }

    .best-line { font-weight: bold; color: var(--pink); }
    .best-line.new { animation: best-pop 0.6s ease; }
    @keyframes best-pop {
      0%, 100% { transform: scale(1); }
      40% { transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">🫧 Number Bubble Pop</h1>
  </header>

  <p style="text-align:center; font-size:1.5rem; font-weight:bold; color:var(--ink); margin:0 0 0.25rem;">
    Pop the number: <span id="target" style="color:var(--pink); font-size:2rem;">?</span>
  </p>

  <div class="scoreboard">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">45</span></div>
    <div class="combo-chip zero" id="combo">🔥 0</div>
    <div>Best: <span id="best">0</span></div>
  </div>

  <div id="play-area">
    <div class="start-overlay" id="overlay">
      <h2 id="overlay-title">Find the numbers! 🔢</h2>
      <p id="overlay-text">A number appears at the top. Pop the bubble that matches it before time runs out!</p>
      <div class="levels" id="levels">
        <button class="level-btn" data-level="easy" aria-pressed="false">Easy<small>1–5</small></button>
        <button class="level-btn" data-level="normal" aria-pressed="true">Normal<small>1–9</small></button>
        <button class="level-btn" data-level="hard" aria-pressed="false">Hard<small>1–20</small></button>
      </div>
      <p class="best-line" id="best-line"></p>
      <button class="btn" id="start-btn">Start Game ▶</button>
    </div>
  </div>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="bubble-pop.js"></script>
</body>
</html>
