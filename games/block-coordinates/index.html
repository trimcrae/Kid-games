<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⛏️ Block Coordinates</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛏️</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    /* ====== Block Coordinates — game-specific styles ====== */
    .game-stage { max-width: 660px; }

    .intro {
      color: #6a6385;
      font-size: 1rem;
      margin: 0 auto 1.25rem;
      max-width: 32rem;
      line-height: 1.45;
    }

    /* --- big menu / mode buttons --- */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1.25rem 0 0.5rem;
    }
    .mode-btn {
      font-family: var(--font);
      cursor: pointer;
      border: 4px solid transparent;
      border-radius: 22px;
      background: var(--paper);
      box-shadow: 0 10px 26px rgba(43, 36, 64, 0.14);
      padding: 1.4rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .mode-btn:hover, .mode-btn:focus-visible {
      transform: translateY(-5px);
      border-color: var(--accent, var(--green));
      outline: none;
    }
    .mode-btn .big { font-size: 2.6rem; line-height: 1; }
    .mode-btn .name { font-weight: bold; font-size: 1.15rem; }
    .mode-btn .desc { font-size: 0.82rem; color: #6a6385; }

    /* --- level picker --- */
    .levels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .level-card {
      position: relative;
      cursor: pointer;
      font-family: var(--font);
      border: 3px solid #e7e0ff;
      border-radius: 16px;
      background: var(--paper);
      padding: 0.7rem 0.4rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      transition: transform 0.14s ease, border-color 0.14s ease;
    }
    .level-card:hover, .level-card:focus-visible {
      transform: translateY(-4px);
      border-color: var(--green);
      outline: none;
    }
    .level-card .mini { pointer-events: none; }
    .level-card .lvname { font-size: 0.82rem; font-weight: bold; }
    .level-card .lvsize { font-size: 0.7rem; color: #8a82a6; }
    .level-card .star {
      position: absolute;
      top: -10px; right: -8px;
      font-size: 1.35rem;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
    }

    /* =======================================================
       THE WORLD BOARD
       ======================================================= */
    .board-wrap { display: flex; justify-content: center; margin: 0.9rem 0; }
    .board {
      display: inline-grid;
      grid-template-columns: auto repeat(var(--n), var(--cell));
      grid-template-rows: repeat(var(--n), var(--cell)) auto;
      gap: 2px;
      background:
        radial-gradient(120% 120% at 50% 0%, #5a6b8c 0%, #38415c 60%, #2a3047 100%);
      padding: 10px 10px 8px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(20, 16, 40, 0.4),
                  inset 0 2px 0 rgba(255,255,255,0.06);
      position: relative;
      touch-action: manipulation;
    }
    .cell {
      width: var(--cell);
      height: var(--cell);
      padding: 0;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      user-select: none;
      position: relative;
      transition: background 0.1s ease, box-shadow 0.1s ease;
    }
    .cell:hover { background: rgba(255,255,255,0.12); }
    /* faint blueprint outline showing where blocks will go */
    .cell.plan { box-shadow: inset 0 0 0 2px rgba(120, 200, 255, 0.32); }
    .cell.plan::after {
      content: "";
      position: absolute; inset: 26%;
      border: 2px dashed rgba(150, 210, 255, 0.4);
      border-radius: 3px;
    }
    .cell.filled { background: transparent; box-shadow: none; }
    .cell.filled::after { display: none; }
    .cell.cursor { box-shadow: inset 0 0 0 3px var(--yellow); z-index: 3; }
    /* row/column trace — teaches "across then up" */
    .cell.trace { background: rgba(255, 220, 120, 0.18); }
    .cell.target-pulse { animation: tpulse 0.7s ease-in-out 3; z-index: 4; }
    .cell.shake { animation: cshake 0.32s ease; }
    .cell.dug::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: 4px;
      background: #6b4a30;
      box-shadow: inset 3px 3px 0 rgba(255,255,255,.10), inset -3px -3px 0 rgba(0,0,0,.35);
    }

    @keyframes cshake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    @keyframes tpulse {
      0%,100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07); }
      50% { box-shadow: inset 0 0 0 3px var(--yellow), 0 0 14px var(--yellow); }
    }
    /* block "drops in" with a little bounce */
    @keyframes drop {
      0%   { transform: translateY(-130%) scale(0.7); opacity: 0; }
      55%  { transform: translateY(8%)   scale(1.08); opacity: 1; }
      75%  { transform: translateY(-4%)  scale(0.98); }
      100% { transform: translateY(0)     scale(1); }
    }

    /* axis labels — game HUD look */
    .axis {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #ffd98a;
      font-size: calc(var(--cell) * 0.42);
      min-width: 1.3rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, color 0.12s ease;
    }
    .board.nonums .axis { opacity: 0; }
    .board.nonums .axis.lit { opacity: 1; }
    .axis.lit { color: #fff36b; transform: scale(1.45); text-shadow: 0 0 8px #ffd34d; }
    .corner {
      font-size: calc(var(--cell) * 0.34);
      display: flex; align-items: flex-end; justify-content: flex-end;
      color: #9fb0d6; padding-right: 2px; font-weight: bold;
    }

    /* =======================================================
       MINECRAFT-STYLE BLOCKS (pure CSS, no images)
       ======================================================= */
    .b {
      display: block;
      width: 100%; height: 100%;
      border-radius: 4px;
      background-color: var(--c, #8a8a8a);
      box-shadow:
        inset 0.18em 0.18em 0 rgba(255,255,255,0.26),
        inset -0.2em -0.2em 0 rgba(0,0,0,0.34);
      position: relative;
      overflow: hidden;
    }
    .b.drop { animation: drop 0.34s cubic-bezier(.3,1.3,.5,1); }
    /* speckle/noise texture overlay shared by every block */
    .b::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(rgba(0,0,0,0.20) 22%, transparent 24%),
        radial-gradient(rgba(0,0,0,0.20) 22%, transparent 24%),
        radial-gradient(rgba(255,255,255,0.18) 22%, transparent 24%),
        radial-gradient(rgba(255,255,255,0.14) 22%, transparent 24%);
      background-size: 30% 30%, 26% 26%, 33% 33%, 22% 22%;
      background-position: 8% 18%, 64% 72%, 78% 22%, 30% 80%;
    }

    .b-grass   { --c: #74b24a; }
    .b-grass::after { content:""; position:absolute; left:0; right:0; bottom:0; height:22%;
      background:#6b4a30; box-shadow: inset 0 2px 0 rgba(0,0,0,.18); }
    .b-dirt    { --c: #7c5235; }
    .b-stone   { --c: #9a9a9a; }
    .b-cobble  { --c: #8a8a8a; }
    .b-cobble::after { content:""; position:absolute; inset:0;
      background:
        radial-gradient(circle at 28% 32%, rgba(0,0,0,.22) 0 18%, transparent 20%),
        radial-gradient(circle at 70% 64%, rgba(0,0,0,.22) 0 16%, transparent 18%); }
    .b-planks  { --c: #b3823f; }
    .b-planks::after { content:""; position:absolute; inset:0;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 2px, transparent 2px 50%),
        linear-gradient(90deg, transparent 48%, rgba(0,0,0,.18) 49% 51%, transparent 52%); }
    .b-log     { --c: #6e4a28; }
    .b-log::after { content:""; position:absolute; inset:0;
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,.14) 0 2px, transparent 2px 25%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.18) 0 14%, transparent 16%); }
    .b-leaves  { --c: #3f8a34; }
    .b-leaves::before { opacity: 0.9; }
    .b-diamond { --c: #56d6d0; }
    .b-diamond::after { content:""; position:absolute; inset:0;
      background:
        radial-gradient(circle at 32% 30%, #ffffff 0 9%, transparent 13%),
        radial-gradient(circle at 68% 64%, rgba(255,255,255,.85) 0 7%, transparent 11%);
      animation: shine 2.2s ease-in-out infinite; }
    @keyframes shine { 0%,100%{opacity:.6} 50%{opacity:1} }
    .b-gold    { --c: #f0c63f; }
    .b-gold::after { content:""; position:absolute; inset:0;
      background: radial-gradient(circle at 35% 32%, rgba(255,255,255,.7) 0 10%, transparent 14%); }
    .b-red     { --c: #cf3b3b; }
    .b-water   { --c: #3f7fd6; }
    .b-water::after { content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.16) 0 2px, transparent 2px 33%); }
    .b-sand    { --c: #e3d49a; }
    .b-purple  { --c: #9a55cf; }
    .b-black   { --c: #2a2436; }
    .b-black::before { opacity: 0.5; }
    .b-white   { --c: #ece7dc; }
    .b-pink    { --c: #e58cb6; }

    /* mini block (for previews & legend) */
    .mini { display: inline-grid; gap: 1px; vertical-align: middle; }
    .mini .mb { width: 100%; height: 100%; border-radius: 2px;
      background-color: var(--c, #888);
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.28), inset -1px -1px 0 rgba(0,0,0,.32); }

    /* --- instruction / hud --- */
    .instruction {
      font-size: 1.15rem;
      font-weight: bold;
      min-height: 2.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .instruction .coord {
      background: var(--ink);
      color: #fff;
      border-radius: 10px;
      padding: 0.12rem 0.6rem;
      font-size: 1.35rem;
      letter-spacing: 0.5px;
      box-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }
    .instruction .ib {
      display: inline-block; width: 1.6rem; height: 1.6rem;
      border-radius: 4px; vertical-align: middle;
    }

    .toprow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }
    .blueprint {
      background: linear-gradient(160deg, #1f4e8a, #15375f);
      border: 3px solid #9fc6ff;
      border-radius: 12px;
      padding: 8px 10px;
      color: #dbeaff;
    }
    .blueprint .bp-title { font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; opacity: .85; }
    .combo {
      font-weight: bold; color: var(--green);
      min-width: 4.5rem; text-align: left;
      font-size: 1.05rem;
    }
    .combo .flame { font-size: 1.2rem; }

    .progress {
      height: 14px;
      background: #e7e0ff;
      border-radius: 999px;
      overflow: hidden;
      margin: 0.55rem auto;
      max-width: 22rem;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.12);
    }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width 0.25s ease;
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }
    .pill {
      font-family: var(--font);
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.95rem;
      background: #fff;
      color: var(--purple);
      box-shadow: 0 4px 12px rgba(43,36,64,0.12);
    }
    .pill.on { background: var(--green); color: #fff; }

    .say {
      min-height: 1.4rem;
      color: var(--purple);
      font-weight: bold;
      margin: 0.4rem 0;
    }

    /* --- palette (free build) --- */
    .palette {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.75rem 0;
    }
    .swatch {
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 10px;
      background: #2a3047;
      padding: 4px;
      width: 3rem; height: 3rem;
      box-shadow: 0 4px 10px rgba(43,36,64,0.18);
    }
    .swatch.sel { border-color: var(--yellow); transform: scale(1.08); }
    .swatch .b { border-radius: 3px; }

    /* --- win banner --- */
    .win-banner {
      margin: 1rem auto;
      padding: 1.25rem;
      border-radius: 20px;
      background: linear-gradient(120deg, #fff7d6, #ffe9f1);
      box-shadow: 0 10px 26px rgba(43,36,64,0.14);
      max-width: 24rem;
    }
    .win-banner h2 { margin: 0.2rem 0; }
    .row-btns { display:flex; gap:0.6rem; justify-content:center; flex-wrap:wrap; margin-top: 0.6rem; }

    /* floating dust particle */
    .dust {
      position: fixed; z-index: 60; pointer-events: none;
      border-radius: 2px;
      will-change: transform, opacity;
    }

    @media (prefers-reduced-motion: reduce) {
      .b.drop, .cell.shake, .cell.target-pulse, .b-diamond::after { animation: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">⛏️ Block Coordinates</h1>
    <p class="subtitle">Build like Minecraft — by reading the grid!</p>
  </header>

  <main class="game-stage">
    <div id="app"></div>
    <p id="say" class="say" aria-live="polite"></p>
  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="game.js"></script>
</body>
</html>
