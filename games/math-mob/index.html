<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🏃 Math Mob Run</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    /* Keep the game from scrolling on phones while you swipe */
    body { overflow: hidden; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      max-width: 560px;
      margin: 0 auto;
      padding: 0 0.75rem;
    }
    .topbar .back-link { margin: 0.6rem 0; }
    .topbar .game-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--purple);
    }

    /* The stage holds the canvas + overlays */
    #stage {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: 74vh;
      min-height: 440px;
      margin: 0 auto;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(43, 36, 64, 0.25);
      background: #bdecff;
      touch-action: none;
      user-select: none;
    }
    #game { display: block; width: 100%; height: 100%; }

    /* Floating heads-up display drawn on top of the canvas */
    .hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0.6rem 0.8rem;
      pointer-events: none;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
      color: #fff;
    }
    .hud .pill {
      background: rgba(43, 36, 64, 0.55);
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .hud .crew { font-size: 1.5rem; background: rgba(138, 92, 255, 0.85); }

    /* Overlays (menu, shop, game over) */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 1.1rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(3px);
      overflow-y: auto;
    }
    .overlay.hidden { display: none; }
    .overlay h2 { font-size: 1.9rem; margin: 0; color: var(--purple); }
    .overlay p  { margin: 0.2rem 0; color: var(--ink); max-width: 30rem; }
    .overlay .big { font-size: 1.25rem; font-weight: bold; }

    .btn {
      font-family: var(--font);
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2.2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(56, 182, 255, 0.35);
      transition: transform 0.12s ease;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.94); }
    .btn.secondary {
      background: linear-gradient(90deg, var(--pink), var(--purple));
      box-shadow: 0 8px 20px rgba(138, 92, 255, 0.3);
    }

    .coinbar {
      font-size: 1.2rem;
      font-weight: bold;
      color: #c98a00;
      background: var(--yellow);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      box-shadow: 0 6px 14px rgba(255, 209, 102, 0.5);
    }

    /* Upgrade shop */
    .shop {
      width: 100%;
      max-width: 30rem;
      display: grid;
      gap: 0.6rem;
    }
    .shop-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: #fff;
      border-radius: 16px;
      padding: 0.6rem 0.8rem;
      box-shadow: 0 6px 16px rgba(43, 36, 64, 0.12);
      text-align: left;
    }
    .shop-row .ico { font-size: 1.9rem; line-height: 1; }
    .shop-row .info { flex: 1; min-width: 0; }
    .shop-row .info b { display: block; font-size: 1.05rem; }
    .shop-row .info small { color: #6a6385; }
    .shop-row .lvl {
      font-size: 0.8rem;
      color: #fff;
      background: var(--purple);
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
      margin-left: 0.3rem;
    }
    .buy-btn {
      font-family: var(--font);
      font-weight: bold;
      font-size: 0.95rem;
      color: #7a5400;
      background: var(--yellow);
      border: none;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(255, 209, 102, 0.5);
    }
    .buy-btn:active { transform: scale(0.94); }
    .buy-btn:disabled {
      background: #e6e1f0;
      color: #a59fb8;
      cursor: not-allowed;
      box-shadow: none;
    }
    .buy-btn.maxed { background: var(--green); color: #fff; }

    .hint { font-size: 0.9rem; color: #6a6385; }

    .reset-link {
      background: none;
      border: none;
      color: #a59fb8;
      font-size: 0.8rem;
      text-decoration: underline;
      cursor: pointer;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="../../">← Arcade</a>
    <span class="game-name">🏃 Math Mob Run</span>
    <span style="width: 5.5rem"></span>
  </div>

  <div id="stage">
    <canvas id="game"></canvas>

    <!-- Live HUD -->
    <div class="hud" id="hud" style="display:none">
      <div class="pill crew">🏃 <span id="crew">1</span></div>
      <div class="pill">🪙 <span id="run-coins">0</span></div>
      <div class="pill">📏 <span id="dist">0</span>m</div>
    </div>

    <!-- Start menu + shop -->
    <div class="overlay" id="menu">
      <h2>🏃 Math Mob Run</h2>
      <p>Swipe (or use ← →) to steer your crew through the gate that makes the
         <b>biggest</b> mob. Dodge the red barriers. Grow your math brain! 🧠</p>
      <div class="coinbar">🪙 <span id="bank">0</span> coins</div>
      <button class="btn" id="play-btn">Play ▶</button>
      <button class="btn secondary" id="shop-btn">🛒 Upgrades</button>
      <div class="hint" id="best-line"></div>
    </div>

    <!-- Shop screen -->
    <div class="overlay hidden" id="shop-screen">
      <h2>🛒 Upgrades</h2>
      <div class="coinbar">🪙 <span id="bank2">0</span> coins</div>
      <div class="shop" id="shop"></div>
      <button class="btn" id="shop-back">Done</button>
      <button class="reset-link" id="reset-btn">reset all progress</button>
    </div>

    <!-- Game over -->
    <div class="overlay hidden" id="gameover">
      <h2 id="go-title">Run finished! 🏁</h2>
      <p class="big">You ran <span id="go-dist">0</span> m</p>
      <p>Biggest mob: 🏃 <span id="go-crew">0</span></p>
      <p>🪙 <span id="go-coins">0</span> coins collected</p>
      <p class="hint" id="go-best"></p>
      <button class="btn" id="again-btn">Run again ▶</button>
      <button class="btn secondary" id="go-shop-btn">🛒 Spend coins</button>
    </div>
  </div>

  <script src="math-mob.js"></script>
</body>
</html>
