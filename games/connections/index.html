<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔗 Connections</title>
  <meta name="description" content="Sort 16 cards into 4 secret groups of 4 — a kid-friendly Connections that builds logic & vocabulary." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .btn {
      font-family: var(--font); font-size: 1.1rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      border: none; border-radius: 999px; padding: 0.7rem 1.5rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(138,92,255,0.3); transition: transform 0.15s ease; touch-action: manipulation;
    }
    .btn:hover:not(:disabled) { transform: scale(1.05); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .btn.ghost { background: var(--paper); color: var(--purple); box-shadow: 0 6px 16px rgba(43,36,64,0.12); }

    /* puzzle picker */
    #puzzles.hidden, #play.hidden { display: none; }
    .puz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1.1rem; max-width: 720px; margin: 0 auto; }
    .puz-card {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      background: var(--paper); border: 4px solid transparent; border-radius: 22px;
      padding: 1.3rem 1rem; cursor: pointer; box-shadow: 0 10px 26px rgba(43,36,64,0.12);
      transition: transform 0.15s ease, border-color 0.15s ease; font-family: var(--font); color: var(--ink); text-align: center;
    }
    .puz-card:hover, .puz-card:focus-visible { transform: translateY(-6px); border-color: var(--purple); outline: none; }
    .puz-card .pz-emoji { font-size: 2.6rem; }
    .puz-card h3 { margin: 0; font-size: 1.1rem; }
    .puz-card .pz-progress { font-size: 0.85rem; color: #6a6385; font-weight: bold; }
    .puz-card.solved { border-color: var(--green); }
    /* phones: two compact columns instead of one giant card per row */
    @media (max-width: 520px) {
      .puz-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
      .puz-card { padding: 0.9rem 0.5rem; border-radius: 18px; gap: 0.2rem; }
      .puz-card .pz-emoji { font-size: 2.1rem; }
      .puz-card h3 { font-size: 0.98rem; }
    }

    /* solved group rows */
    .solved-row {
      border-radius: 16px; padding: 0.6rem; margin: 0 auto 0.5rem; max-width: 560px;
      color: #fff; box-shadow: 0 6px 16px rgba(43,36,64,0.18);
    }
    .solved-row .grp-name { font-weight: bold; font-size: 1.05rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .solved-row .grp-items { font-size: 0.95rem; margin-top: 0.15rem; }

    /* the 4x4 board */
    .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; max-width: 560px; margin: 0 auto 1rem; }
    .tile {
      aspect-ratio: 1 / 1; border: none; border-radius: 14px; background: #efeaf9; color: var(--ink);
      font-family: var(--font); font-weight: bold; cursor: pointer; padding: 0.2rem;
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: clamp(0.62rem, 2.4vw, 0.95rem); line-height: 1.05; word-break: break-word;
      box-shadow: 0 4px 10px rgba(43,36,64,0.1); transition: transform 0.1s ease, background 0.12s ease;
      touch-action: manipulation;
    }
    .tile:active { transform: scale(0.94); }
    .tile.selected { background: var(--ink); color: #fff; transform: scale(0.96); }
    .tile.wrong { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 60%{transform:translateX(7px);} }
    .tile.pop { animation: pop 0.3s ease; }
    @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }

    .lives { font-size: 1.2rem; font-weight: bold; color: var(--purple); margin: 0.25rem 0; min-height: 1.5rem; }
    .lives .dot { font-size: 1.3rem; }
    .feedback { min-height: 1.5rem; font-size: 1.15rem; font-weight: bold; color: var(--green); margin: 0.25rem 0 0.5rem; }
    .controls { display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">🔗 Connections</h1>
    <p class="subtitle">Find the 4 secret groups of 4. Tap four cards that go together!</p>
  </header>

  <main class="game-stage" style="max-width: 760px;">

    <!-- PUZZLE PICKER -->
    <section id="puzzles">
      <p style="font-weight:bold;color:var(--purple);font-size:1.2rem;margin-top:0;">Pick a puzzle:</p>
      <div class="puz-grid" id="puz-grid"></div>
    </section>

    <!-- PLAY -->
    <section id="play" class="hidden">
      <div id="solved"></div>
      <div class="board" id="board"></div>
      <div class="lives" id="lives" aria-live="polite"></div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <div class="controls">
        <button class="btn ghost" id="shuffle-btn">🔀 Shuffle</button>
        <button class="btn ghost" id="deselect-btn">Clear pick</button>
        <button class="btn" id="submit-btn">Check ✓</button>
      </div>
      <div class="controls" style="margin-top:0.5rem;">
        <button class="btn ghost" id="quit-btn">🔗 All puzzles</button>
      </div>
    </section>

  </main>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="connections.js"></script>
</body>
</html>
