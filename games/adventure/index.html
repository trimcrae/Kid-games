<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗺️ Choose Your Own Adventure</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .adv-wrap { max-width: 820px; margin: 0 auto 3rem; padding: 0 1rem; }
    .adv-intro { text-align: center; color: var(--purple); font-weight: bold;
                 font-size: clamp(1rem, 3.4vw, 1.3rem); margin: 0.25rem 0 1.25rem; }

    /* ---- Library (story picker) ---- */
    .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .story-card {
      border: none; cursor: pointer; font-family: inherit; color: #fff;
      border-radius: 26px; padding: 0 0 1.1rem; text-align: center; overflow: hidden;
      box-shadow: 0 12px 28px rgba(43,36,64,.28);
      transition: transform .15s ease, box-shadow .15s ease; position: relative;
    }
    .story-card:hover, .story-card:focus-visible {
      transform: translateY(-6px) rotate(-1deg);
      box-shadow: 0 18px 38px rgba(43,36,64,.4); outline: none;
    }
    .story-card .cover { display:block; width: 100%; height: 150px; }
    .story-card .cover svg { display:block; }
    .story-card .cover .cover-img { display:block; width:100%; height:150px; object-fit:cover; }
    .story-card h2 { margin: .6rem .6rem .1rem; font-size: 1.15rem; line-height: 1.15; }
    .story-card .who  { margin: 0 .6rem; font-size: .82rem; opacity: .9; font-weight: bold; }
    .story-card .teach{ margin: .35rem .7rem 0; font-size: .85rem; opacity: .92; }
    .story-card .learn{ margin: .35rem .7rem 0; font-size: .72rem; opacity: .72; font-style: italic; }
    .story-card .endcount {
      margin: .55rem auto 0; display: inline-block; font-size: .72rem; font-weight: bold;
      background: rgba(255,255,255,.22); padding: .2rem .7rem; border-radius: 999px;
    }
    .story-card .done-star {
      position: absolute; top: 10px; right: 12px; font-size: 1.5rem; z-index: 2;
      animation: twinkle 2s ease-in-out infinite; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
    }
    @keyframes twinkle { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.25);opacity:1} }

    /* ---- Reader ---- */
    .reader { display: none; }
    .reader.active { display: block; }
    .reader-top { display:flex; align-items:center; justify-content:space-between; gap:.4rem; margin-bottom:.6rem; }
    .reader-title { color: var(--purple); font-size: clamp(1.05rem,3.6vw,1.5rem); margin: 0; flex: 1; text-align:center; }

    .book {
      background: linear-gradient(160deg, #fff 0%, #fbf4ff 100%);
      border-radius: 28px; padding: .8rem .8rem 1rem;
      box-shadow: 0 16px 40px rgba(43,36,64,.22); border: 4px solid #e7d6ff;
    }
    .scene-art {
      width: 100%; aspect-ratio: 4 / 3; border-radius: 20px; overflow: hidden;
      background: #120a2a; display: block; line-height: 0;
    }
    .scene-art .scene-img { display:block; width:100%; height:100%; object-fit:cover; }
    .scene-art.turning { animation: pageTurn .5s ease; }
    @keyframes pageTurn {
      0%   { transform: perspective(900px) rotateY(0); opacity: 1; }
      45%  { transform: perspective(900px) rotateY(-16deg) scale(.97); opacity: .3; }
      100% { transform: perspective(900px) rotateY(0); opacity: 1; }
    }
    .scene-text {
      color: var(--ink); font-size: clamp(1.05rem, 3.6vw, 1.4rem); line-height: 1.45;
      text-align: center; margin: .9rem .4rem .2rem; min-height: 3.2em; font-weight: 600;
    }
    .end-badge {
      display: none; text-align: center; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border-radius: 999px; padding: .5rem 1rem; margin: .4rem auto .2rem; max-width: 90%;
      font-size: clamp(1rem, 3.4vw, 1.3rem); box-shadow: 0 6px 16px rgba(138,92,255,.35);
    }

    /* choice buttons — big tap targets */
    .choices { display: flex; flex-direction: column; gap: .7rem; margin: 1rem auto 0; max-width: 520px; }
    .choice-btn {
      border: none; cursor: pointer; font-family: inherit; font-weight: bold;
      color: #2b2440; background: var(--yellow); border-radius: 18px;
      padding: 1rem 1.1rem; font-size: clamp(1rem,3.6vw,1.25rem);
      box-shadow: 0 6px 0 #c79a2e, 0 10px 18px rgba(0,0,0,.15);
      transition: transform .08s ease, box-shadow .08s ease;
      -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1.25;
    }
    .choice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c79a2e, 0 4px 10px rgba(0,0,0,.15); }
    .choice-btn.pink { background: var(--pink); color:#fff; box-shadow: 0 6px 0 #c23968, 0 10px 18px rgba(0,0,0,.18); }
    .choice-btn.pink:active { box-shadow: 0 2px 0 #c23968, 0 4px 10px rgba(0,0,0,.18); }
    .choice-btn.blue { background: var(--blue); color:#fff; box-shadow: 0 6px 0 #2a86bd, 0 10px 18px rgba(0,0,0,.18); }
    .choice-btn.blue:active { box-shadow: 0 2px 0 #2a86bd, 0 4px 10px rgba(0,0,0,.18); }

    .round-btn {
      border: none; cursor: pointer; font-family: inherit; font-weight: bold; color: #fff;
      background: var(--purple); border-radius: 999px; padding: .7rem; font-size: 1.4rem;
      line-height: 1; min-width: 52px; box-shadow: 0 5px 0 #5e3bb0, 0 8px 14px rgba(0,0,0,.18);
      transition: transform .08s ease, box-shadow .08s ease; -webkit-tap-highlight-color: transparent;
    }
    .round-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #5e3bb0; }
    .round-btn.muted { background: #b3a9cf; box-shadow: 0 5px 0 #8d83ad; }

    .reader-bottom { display:flex; align-items:center; justify-content:center; gap:.6rem; margin-top:.7rem; }

    @media (prefers-reduced-motion: reduce) {
      .scene-art.turning, .story-card .done-star { animation: none; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding: .5rem 1rem 0;">
    <h1 class="title">🗺️ Choose Your Own Adventure</h1>
  </header>

  <main class="adv-wrap">
    <!-- LIBRARY -->
    <section id="library">
      <p class="adv-intro">Pick a story, then YOU choose what happens next! 🌟</p>
      <div id="story-grid" class="story-grid"></div>
    </section>

    <!-- READER -->
    <section id="reader" class="reader">
      <div class="reader-top">
        <button class="round-btn" id="home-btn" aria-label="Back to all stories">🏠</button>
        <h2 class="reader-title" id="reader-title">Story</h2>
      </div>

      <div class="book">
        <div class="scene-art" id="scene-art"></div>
        <p class="scene-text" id="scene-text"></p>
        <div class="end-badge" id="end-badge"></div>
        <div id="choices" class="choices"></div>
        <div class="reader-bottom">
          <button class="round-btn" id="back-btn" aria-label="Go back one choice" style="background:var(--blue);box-shadow:0 5px 0 #2a86bd,0 8px 14px rgba(0,0,0,.18)">◀</button>
        </div>
      </div>
    </section>
  </main>

  <script src="art.js"></script>
  <script src="story-data.js"></script>
  <script src="stories-long.js"></script>
  <script src="adventure.js"></script>
</body>
</html>
