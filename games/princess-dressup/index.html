<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👑 Princess Dress-Up</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .stars { font-size: 1.3rem; font-weight: bold; color: var(--purple); }
    .stars span { color: var(--pink); }
    .mute-btn {
      font-size: 1.4rem;
      border: none;
      background: #fff;
      border-radius: 999px;
      width: 48px; height: 48px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(43,36,64,0.15);
    }

    .stage {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      text-align: center;
    }

    /* ---------- the princess (pixel-art layers) ---------- */
    .princess {
      position: relative;
      margin: 0.25rem auto 0.75rem;
      width: min(270px, 82vw);
      aspect-ratio: 165 / 218;   /* matches the sprite grid */
    }
    .princess canvas {
      position: absolute; inset: 0;
      width: 100% !important; height: 100% !important;
      image-rendering: pixelated;
    }
    .princess-base { z-index: 1; }

    /* outfit pieces — each a full-frame sprite layer, hidden until earned */
    .acc {
      position: absolute; inset: 0; z-index: 2;
      opacity: 0; transform: scale(0.3);
      transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    .acc.on { opacity: 1; transform: scale(1); }
    .acc[data-slot="wand"].on { transform: scale(1) rotate(7deg); }

    /* ---------- prompt ---------- */
    .prompt {
      background: rgba(255,255,255,0.8);
      border-radius: 22px;
      padding: 0.85rem 1rem;
      box-shadow: 0 8px 22px rgba(43,36,64,0.12);
      margin-bottom: 1rem;
    }
    .prompt-label { font-size: 1.25rem; font-weight: bold; color: var(--purple); }
    #target-char {
      display: inline-block;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--pink);
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .gem {
      font-family: var(--font);
      width: 100px; height: 100px;
      border: none;
      border-radius: 24px;
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15), 0 8px 18px rgba(43,36,64,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.14s ease;
    }
    .gem:hover { transform: translateY(-4px) scale(1.04); }
    .gem.correct { animation: pop 0.45s ease; }
    @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.18);} 100%{transform:scale(1);} }
    .gem.wrong { animation: wobble 0.45s ease; }
    @keyframes wobble { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-9px) rotate(-4deg);} 75%{transform:translateX(9px) rotate(4deg);} }

    /* overlay */
    .overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; text-align: center; padding: 1.5rem;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; margin: 0; color: var(--purple); }
    .overlay .big { font-size: 4rem; }
    .btn {
      font-family: var(--font); font-size: 1.3rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none; border-radius: 999px; padding: 0.9rem 2.2rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(138,92,255,0.3); transition: transform 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.4rem; padding-bottom: 0.3rem;">
    <h1 class="title">👑 Princess Dress-Up</h1>
  </header>

  <div class="stage">
    <div class="topbar">
      <div class="stars">Princesses dressed: <span id="stars">0</span> ⭐</div>
      <button class="mute-btn" id="mute" aria-label="Turn sound on or off">🔊</button>
    </div>

    <div class="princess" id="princess" aria-hidden="true"><!-- pixel-art sprite built by princess-art.js --></div>

    <div class="prompt">
      <span class="prompt-label" id="prompt-label">Tap the matching one!</span>
      <span id="target-char">?</span>
    </div>

    <div class="choices" id="choices"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="big">👸✨</div>
    <h2 id="overlay-title">Let's dress a princess!</h2>
    <p id="overlay-text">Find the letters and numbers to give her a crown, a wand, and more!</p>
    <button class="btn" id="start-btn">Start ▶</button>
  </div>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="../../assets/js/voice.js"></script>
  <script src="../../assets/js/pixelart.js"></script>
  <script src="princess-art.js"></script>
  <script src="princess.js"></script>
</body>
</html>
