<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👑 Princess Dress-Up</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .stars { font-size: 1.3rem; font-weight: bold; color: var(--purple); }
    .stars span { color: var(--pink); }
    .mute-btn {
      font-size: 1.4rem;
      border: none;
      background: #fff;
      border-radius: 999px;
      width: 48px; height: 48px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(43,36,64,0.15);
    }

    .stage {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      text-align: center;
    }

    /* ---------- the princess ---------- */
    .princess {
      position: relative;
      width: 240px;
      height: 300px;
      margin: 0.5rem auto 1rem;
    }
    .hair {
      position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
      width: 108px; height: 130px;
      background: #6b3e16;
      border-radius: 54px 54px 40px 40px;
      z-index: 2;
    }
    .head {
      position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
      width: 74px; height: 74px; border-radius: 50%;
      background: #ffd9b3; z-index: 3;
    }
    .eye { position: absolute; top: 30px; width: 9px; height: 9px; border-radius: 50%; background: #4a3327; }
    .eye.left { left: 19px; } .eye.right { right: 19px; }
    .cheek { position: absolute; top: 42px; width: 12px; height: 8px; border-radius: 50%; background: #ffb3c1; opacity: 0.8; }
    .cheek.left { left: 10px; } .cheek.right { right: 10px; }
    .smile {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      width: 26px; height: 13px; border-bottom: 3px solid #c0392b; border-radius: 0 0 26px 26px;
    }
    .dress {
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 56px solid transparent;
      border-right: 56px solid transparent;
      border-bottom: 168px solid var(--dress, #ff6fa5);
      z-index: 1;
      transition: border-bottom-color 0.4s ease;
    }

    /* accessories — hidden until earned */
    .acc {
      position: absolute;
      opacity: 0;
      transform: scale(0.3);
      transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.34,1.56,.64,1);
      z-index: 5;
      pointer-events: none;
    }
    .acc.on { opacity: 1; transform: scale(1); }
    .acc.crown   { top: 6px;  left: 50%; margin-left: -27px; font-size: 54px; z-index: 4; }
    .acc.flower  { top: 58px; left: 50%; margin-left: 26px;  font-size: 30px; }
    .acc.necklace{ top: 112px; left: 50%; margin-left: -14px; font-size: 26px; }
    .acc.wand    { top: 150px; right: 14px; font-size: 44px; }
    .acc.wand.on { transform: scale(1) rotate(22deg); }
    .acc.shoes   { bottom: -6px; left: 50%; margin-left: -28px; font-size: 30px; letter-spacing: 6px; }
    .acc.sparkle { font-size: 34px; }
    .acc.s1 { top: 20px; left: 14px; }
    .acc.s2 { top: 90px; right: 6px; }
    .acc.s3 { bottom: 40px; left: 6px; }

    /* ---------- prompt ---------- */
    .prompt {
      background: rgba(255,255,255,0.8);
      border-radius: 22px;
      padding: 0.85rem 1rem;
      box-shadow: 0 8px 22px rgba(43,36,64,0.12);
      margin-bottom: 1rem;
    }
    .prompt-label { font-size: 1.25rem; font-weight: bold; color: var(--purple); }
    #target-char {
      display: inline-block;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--pink);
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .gem {
      font-family: var(--font);
      width: 100px; height: 100px;
      border: none;
      border-radius: 24px;
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15), 0 8px 18px rgba(43,36,64,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.14s ease;
    }
    .gem:hover { transform: translateY(-4px) scale(1.04); }
    .gem.correct { animation: pop 0.45s ease; }
    @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.18);} 100%{transform:scale(1);} }
    .gem.wrong { animation: wobble 0.45s ease; }
    @keyframes wobble { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-9px) rotate(-4deg);} 75%{transform:translateX(9px) rotate(4deg);} }

    /* overlay */
    .overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; text-align: center; padding: 1.5rem;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; margin: 0; color: var(--purple); }
    .overlay .big { font-size: 4rem; }
    .btn {
      font-family: var(--font); font-size: 1.3rem; font-weight: bold; color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none; border-radius: 999px; padding: 0.9rem 2.2rem; cursor: pointer;
      box-shadow: 0 8px 20px rgba(138,92,255,0.3); transition: transform 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.4rem; padding-bottom: 0.3rem;">
    <h1 class="title">👑 Princess Dress-Up</h1>
  </header>

  <div class="stage">
    <div class="topbar">
      <div class="stars">Princesses dressed: <span id="stars">0</span> ⭐</div>
      <button class="mute-btn" id="mute" aria-label="Turn sound on or off">🔊</button>
    </div>

    <div class="princess" id="princess" aria-hidden="true">
      <div class="hair"></div>
      <div class="head">
        <span class="eye left"></span><span class="eye right"></span>
        <span class="cheek left"></span><span class="cheek right"></span>
        <span class="smile"></span>
      </div>
      <div class="dress" id="dress"></div>
      <span class="acc crown"    data-slot="crown">👑</span>
      <span class="acc flower"   data-slot="flower">🌸</span>
      <span class="acc necklace" data-slot="necklace">💎</span>
      <span class="acc wand"     data-slot="wand">🪄</span>
      <span class="acc shoes"    data-slot="shoes">👠👠</span>
      <span class="acc sparkle s1" data-slot="sparkle">✨</span>
      <span class="acc sparkle s2" data-slot="sparkle">✨</span>
      <span class="acc sparkle s3" data-slot="sparkle">✨</span>
    </div>

    <div class="prompt">
      <span class="prompt-label" id="prompt-label">Tap the matching one!</span>
      <span id="target-char">?</span>
    </div>

    <div class="choices" id="choices"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="big">👸✨</div>
    <h2 id="overlay-title">Let's dress a princess!</h2>
    <p id="overlay-text">Find the letters and numbers to give her a crown, a wand, and more!</p>
    <button class="btn" id="start-btn">Start ▶</button>
  </div>

  <script src="../../assets/js/sfx.js"></script>
  <script src="../../assets/js/confetti.js"></script>
  <script src="../../assets/js/voice.js"></script>
  <script src="princess.js"></script>
</body>
</html>
