<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Mad Libs</title>
  <meta name="description" content="Give silly words by category, then watch them fill a story you've never seen — parts of speech & grammar for big readers." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    /* ---- shared button look (matches the other games) ---- */
    .btn {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border: none;
      border-radius: 999px;
      padding: 0.8rem 2rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(138, 92, 255, 0.3);
      transition: transform 0.15s ease;
      touch-action: manipulation;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
    .btn.ghost {
      background: var(--paper);
      color: var(--purple);
      box-shadow: 0 6px 16px rgba(43, 36, 64, 0.12);
    }

    .hidden { display: none !important; }

    /* ---- picker (story cards) ---- */
    .ml-intro {
      text-align: center;
      font-size: 1.2rem;
      color: var(--ink);
      margin: 0 0 1.5rem;
    }
    .ml-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .ml-card {
      position: relative;
      font-family: var(--font);
      background: var(--paper);
      border: 4px solid var(--accent, var(--blue));
      border-radius: 24px;
      padding: 1.2rem 1rem;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 10px 24px rgba(43, 36, 64, 0.12);
      transition: transform 0.15s ease;
      touch-action: manipulation;
    }
    .ml-card:hover { transform: translateY(-4px) scale(1.03); }
    .ml-card .ml-emoji { font-size: 2.6rem; display: block; }
    .ml-card .ml-name {
      display: block;
      margin-top: 0.4rem;
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--ink);
    }
    .ml-card .ml-tick {
      position: absolute;
      top: 0.4rem;
      right: 0.6rem;
      font-size: 1.3rem;
    }

    /* ---- word entry ---- */
    .ml-progress {
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--purple);
      margin-bottom: 0.5rem;
    }
    .ml-bar {
      height: 12px;
      width: 100%;
      max-width: 420px;
      margin: 0 auto 1.5rem;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }
    .ml-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 999px;
      transition: width 0.3s ease;
    }
    .ml-ask {
      background: var(--paper);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      box-shadow: 0 10px 30px rgba(43, 36, 64, 0.12);
      text-align: center;
    }
    .ml-ask .ml-label {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--ink);
      margin: 0 0 0.3rem;
    }
    .ml-ask .ml-example {
      font-size: 1.05rem;
      color: var(--purple);
      margin: 0 0 1.2rem;
    }
    .ml-input {
      font-family: var(--font);
      font-size: 1.6rem;
      text-align: center;
      width: 100%;
      max-width: 360px;
      padding: 0.7rem 1rem;
      border: 3px solid var(--blue);
      border-radius: 16px;
      outline: none;
      color: var(--ink);
    }
    .ml-input:focus { border-color: var(--purple); }
    .ml-controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    /* ---- reveal ---- */
    .ml-story {
      background: var(--paper);
      border-radius: 24px;
      padding: 1.8rem 1.6rem;
      box-shadow: 0 10px 30px rgba(43, 36, 64, 0.12);
      font-size: 1.4rem;
      line-height: 1.9;
      color: var(--ink);
    }
    .ml-story h2 {
      margin: 0 0 1rem;
      font-size: 1.6rem;
      color: var(--purple);
    }
    .ml-fill {
      font-weight: bold;
      color: var(--pink);
      background: #fff0f5;
      padding: 0 0.25em;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <a class="back-link" href="../../">← Back to the Arcade</a>

  <header class="hero" style="padding-top: 0.5rem;">
    <h1 class="title">📝 Mad Libs</h1>
  </header>

  <main class="game-stage">
    <!-- 1. PICKER -->
    <section id="picker">
      <p class="ml-intro">Pick a story. Give us silly words — but you can't see the
        story yet! Then we'll read your goofy creation out loud. 🤪</p>
      <div id="cards" class="ml-cards"></div>
    </section>

    <!-- 2. WORD ENTRY -->
    <section id="entry" class="hidden">
      <div class="ml-progress" id="progress">word 1 of 8</div>
      <div class="ml-bar"><span id="barFill" style="width:0%"></span></div>
      <div class="ml-ask">
        <p class="ml-label" id="askLabel">a silly adjective</p>
        <p class="ml-example" id="askExample">like “slimy”</p>
        <input class="ml-input" id="wordInput" type="text" autocomplete="off"
               autocapitalize="none" spellcheck="false" />
        <div class="ml-controls">
          <button class="btn ghost" id="backBtn">← Back</button>
          <button class="btn" id="nextBtn">Next →</button>
        </div>
      </div>
    </section>

    <!-- 3. REVEAL -->
    <section id="reveal" class="hidden">
      <div class="ml-story">
        <h2 id="storyTitle"></h2>
        <p id="storyText"></p>
      </div>
      <div class="ml-controls">
        <button class="btn" id="readBtn">🔊 Read it to me</button>
        <button class="btn ghost" id="againBtn">▶ Play again</button>
        <button class="btn ghost" id="pickBtn">📚 Pick another</button>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="mad-libs.js"></script>
</body>
</html>
