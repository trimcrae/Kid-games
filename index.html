<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 The McRae Family Arcade</title>
  <meta name="description" content="A fun little arcade of games made for kids." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
  <meta name="theme-color" content="#8a5cff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="hero">
    <h1 class="title">
      <span class="title-emoji" aria-hidden="true">🎮</span>
      The McRae Family Arcade
    </h1>
    <p class="subtitle">Pick a game and let's play! ✨</p>
  </header>

  <nav class="kid-chips" id="kid-chips" aria-label="Who's playing?">
    <button class="kid-chip" data-kid="all"     aria-pressed="true">🌈 Everybody</button>
    <button class="kid-chip" data-kid="jeannie" aria-pressed="false">📖 Jeannie</button>
    <button class="kid-chip" data-kid="cory"    aria-pressed="false">⛏️ Cory</button>
    <button class="kid-chip" data-kid="ellie"   aria-pressed="false">👑 Ellie</button>
  </nav>

  <main>
    <section class="game-grid" id="game-grid" aria-label="Games">
      <!-- Game cards are added here by assets/js/games.js -->
    </section>
  </main>

  <footer class="footer">
    <p>Made with ❤️ for Jeannie, Cory, Ellie &amp; baby Kieran</p>
  </footer>

  <script src="assets/js/games.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
