<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 The Crae Family Arcade</title>
  <meta name="description" content="A fun little arcade of games made for kids." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="hero">
    <h1 class="title">
      <span class="title-emoji" aria-hidden="true">🎮</span>
      The Crae Family Arcade
    </h1>
    <p class="subtitle">Pick a game and let's play! ✨</p>
  </header>

  <main>
    <section class="game-grid" id="game-grid" aria-label="Games">
      <!-- Game cards are added here by assets/js/games.js -->
    </section>
  </main>

  <footer class="footer">
    <p>Made with ❤️ for three precocious kids (ages 8, 7 &amp; 3)</p>
  </footer>

  <script src="assets/js/games.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
